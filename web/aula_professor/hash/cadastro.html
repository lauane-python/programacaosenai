<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <div class="container">
        <label for="nome_completo">Nome Completo</label>
        <br>
        <input type="text" id="nome_completo" minlength="2">
        <br>
        <br>
        <label for="email">Email</label>
        <br>
        <input type="email" id="email" minlength="2">
        <br>
        <br>
        <label for="senha">Senha</label>
        <br>
        <input type="password" id="senha" minlength="2">
        <br>
        <br>       
        <button id="btn_cadastro">Cadastro</button>

        <p id="resultado">O Resultado irá aparecer aqui</p>

    </div>

<script>

    //Criar um evento para quando clicar no botão
    document.getElementById("btn_cadastro").addEventListener("click", async ()=>{
        //primeira etapa - pegar as informações dos inputs
        const nome_completo = document.getElementById("nome_completo").value
        const email = document.getElementById("email").value
        const senha = document.getElementById("senha").value
        //segunda etapa - fazer a requisição para o back-end
        const resposta = await fetch(`http://localhost:3000/cadastro`,{
            method:"POST",
            headers:{
                "Accept":"application/json",
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                "nome_completo":nome_completo,
                "email":email,
                "senha":senha,
                "caminho_foto":""})
        })
        //terceira etapa - pegar a resposta do back-end

        if(resposta.ok == true){
            const dados = await resposta.json()
            document.getElementById("resultado").innerText = dados.resposta
        }else{

        }

    })

</script>
    
</body>
</html>
