<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container-fluid bg-danger text-center p-2">
        <h1 class="bg-warning w-50">Meu Header container</h1>
        <h2 class="">Trabalhando com Linhas e Colunas</h2>
        <div class="row">
            <p class="bg-info col-sm-2 col-md-3 col-lg-4 fs-4">Primeiro Parágrafo</p>
            <p class="bg-success col-sm-2 col-md-3 col-lg-4 fs-4">Segundo Parágrafo</p>
            <p class="bg-primary col-sm-2 col-md-3 col-lg-4 fs-4">Terceiro Parágrafo</p>
        </div>
        <div class="row bg-danger text-center p-2">
            <button class="btn btn-primary col-sm-2 col-md-3 col-lg-4 fs-1">Primeiro Button</button>
            <button class="btn btn-success col-sm-2 col-md-3 col-lg-4 fs-1">Segundo Button</button>
            <button class="btn btn-warning col-sm-2 col-md-3 col-lg-4 fs-1">Terceiro Button</button>
        </div>
    </div>
</body>
</html>
